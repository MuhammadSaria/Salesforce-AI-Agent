<template>
    <section class="nexus-shell" aria-labelledby="nexus-title">
        <header class="nexus-header">
            <div class="nexus-brand">
                <span class="nexus-brand__icon">
                    <lightning-icon icon-name="standard:work_order" size="small" alternative-text="Providus Nexus"></lightning-icon>
                </span>
                <div>
                    <h1 id="nexus-title" class="nexus-brand__name">Providus Nexus</h1>
                    <p class="nexus-brand__subtitle">Salesforce delivery workspace</p>
                </div>
            </div>
            <div class="nexus-header__status">
                <template if:true={hasJob}><lightning-badge label={statusDisplay}></lightning-badge></template>
                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh workspace" title="Refresh workspace" onclick={handleReload} disabled={isBusy}></lightning-button-icon>
            </div>
        </header>
        <template if:true={isBusy}><lightning-spinner alternative-text="Providus Nexus is working" size="small"></lightning-spinner></template>
        <div class="console">
            <template if:true={errorMessage}><div class="error" role="alert">{errorMessage}</div></template>

            <section class="toolbar" aria-label="Assigned Jira tasks">
                <lightning-combobox label="Assigned Jira Tasks" options={jobOptions} value={selectedJobId} onchange={handleJobSelection}></lightning-combobox>
                <lightning-input label="Jira Issue Key" value={jiraIssueKey} data-field="jiraIssueKey" onchange={handleValue}></lightning-input>
                <lightning-textarea label="Manual User Instruction" value={prompt} data-field="prompt" onchange={handleValue}></lightning-textarea>
                <lightning-button variant="brand" label="Create Job" icon-name="utility:add" onclick={handleCreate} disabled={createDisabled}></lightning-button>
            </section>

            <template if:false={hasJob}>
                <section class="empty-state" aria-labelledby="empty-state-title">
                    <lightning-icon icon-name="utility:task" size="small" alternative-text="Select a Jira task"></lightning-icon>
                    <div>
                        <h2 id="empty-state-title">Start with a Jira task</h2>
                        <p>Select an assigned Jira task or provide a Jira key and instruction to begin.</p>
                    </div>
                </section>
            </template>

            <template if:true={hasJob}>
                <div class="identity-bar">
                    <div><span class="label">Status</span><lightning-badge label={statusDisplay}></lightning-badge></div>
                    <div><span class="label">Customer</span><strong>{orgContext.customerName}</strong></div>
                    <div><span class="label">Target Org</span><strong>{orgContext.displayName}</strong></div>
                    <div><span class="label">Environment</span><strong>{orgContext.environment}</strong></div>
                    <div><span class="label">Organization ID</span><code>{orgContext.expectedOrgId}</code></div>
                </div>
                <template if:true={isProduction}><div class="production-warning" role="alert">You are reviewing work for a Production Salesforce org. Deployment requires production-specific approval.</div></template>
                <template if:true={hasDataOperations}><div class="production-warning" role="alert">This plan contains Salesforce record changes. Review every object, record ID, field, and value before granting the separate execution approval.</div></template>
                <template if:true={hasDeleteOperations}><div class="production-warning" role="alert">Destructive action: this plan will delete an existing Salesforce record. Confirm the exact object and record ID. Recovery depends on Salesforce Recycle Bin support and retention.</div></template>

                <ol class="milestones workflow-progress" aria-label="Delivery progress">
                    <template for:each={workflowStages} for:item="stage">
                        <li class={stage.className} key={stage.key} aria-current={stage.ariaCurrent}>
                            <lightning-icon icon-name={stage.iconName} size="x-small" alternative-text={stage.label}></lightning-icon>
                            <div><strong>{stage.label}</strong><span>{stage.detail}</span></div>
                        </li>
                    </template>
                </ol>

                <section class={currentActionClass} aria-labelledby="current-action-title" aria-live="polite">
                    <lightning-icon icon-name={currentAction.iconName} size="small" alternative-text={currentAction.title}></lightning-icon>
                    <div>
                        <span class="current-action__eyebrow">Current action</span>
                        <h2 id="current-action-title">{currentAction.title}</h2>
                        <p>{currentAction.message}</p>
                    </div>
                </section>

                <template if:true={requirementsBlocked}>
                    <section class="requirements-blocked" role="alert" aria-labelledby="requirements-blocked-title">
                        <lightning-icon icon-name="utility:warning" size="small" alternative-text="More information required"></lightning-icon>
                        <div>
                            <h2 id="requirements-blocked-title">More information is required</h2>
                            <p>Providus Nexus has not made or approved any Salesforce changes for this request.</p>
                            <ul>
                                <template for:each={missingRequirementItems} for:item="item"><li key={item.key}>{item.text}</li></template>
                            </ul>
                            <template if:true={hasAttachmentFailures}>
                                <h3>Attachment issues</h3>
                                <ul>
                                    <template for:each={attachmentFailureItems} for:item="item"><li key={item.key}>{item.text}</li></template>
                                </ul>
                            </template>
                            <p class="requirements-blocked__next">Add the missing details below, or correct the Jira attachment and select Refresh Analysis.</p>
                        </div>
                    </section>
                </template>

                <template if:true={hasSpecialistWorkItems}>
                    <section class="specialist-progress" aria-labelledby="specialist-progress-title">
                        <div class="specialist-progress__heading">
                            <div class="specialist-progress__summary">
                                <h2 id="specialist-progress-title">Specialist delivery progress</h2>
                                <p>{specialistProgressSummary}. Providus Nexus combines these results into one implementation plan and one approval.</p>
                            </div>
                            <div class="specialist-progress__controls">
                                <lightning-badge label={specialistOverallStatus}></lightning-badge>
                                <lightning-button-icon icon-name={specialistToggleIcon} alternative-text={specialistToggleTitle} title={specialistToggleTitle} aria-expanded={specialistsExpanded} onclick={handleToggleSpecialists}></lightning-button-icon>
                            </div>
                        </div>
                        <template if:true={specialistsExpanded}>
                            <div class="specialist-list">
                                <template for:each={specialistWorkItems} for:item="item">
                                    <article class="specialist-row" key={item.key}>
                                        <div class="specialist-row__identity">
                                            <strong>{item.agentName}</strong>
                                            <span class={item.statusClass}>{item.status}</span>
                                        </div>
                                        <div>
                                            <p>{item.responsibility}</p>
                                            <p class="specialist-row__work">{item.proposedWork}</p>
                                            <template if:true={item.preserved}><span class="specialist-row__preserved">{item.preservedText}</span></template>
                                        </div>
                                    </article>
                                </template>
                            </div>
                        </template>
                    </section>
                </template>

                <template if:true={validationFailed}>
                    <section class="validation-failure" role="alert" aria-labelledby="validation-failure-title">
                        <lightning-icon icon-name="utility:error" size="small" alternative-text="Validation failed"></lightning-icon>
                        <div>
                            <h2 id="validation-failure-title">Why validation failed</h2>
                            <p>{validationFailureReason}</p>
                            <p class="failure-next-step">Nothing was deployed. Correct the proposed implementation and run validation again before requesting deployment approval.</p>
                        </div>
                    </section>
                </template>

                <template if:true={deploymentComplete}>
                    <section class="deployment-summary" aria-labelledby="deployment-summary-title">
                        <h2 id="deployment-summary-title">Deployment complete</h2>
                        <p class="deployment-summary-text">{deploymentSummaryText}</p>
                        <p class="deployment-summary-detail"><strong>How it works:</strong> {deploymentHowItWorks}</p>
                        <p class="deployment-summary-detail"><strong>Validation:</strong> {deploymentValidationSummary}</p>
                        <template if:true={hasDeploymentItems}>
                            <div class="deployment-table">
                                <div class="deployment-table__header">
                                    <span>Name</span>
                                    <span>API Name</span>
                                    <span>Brief Info</span>
                                </div>
                                <template for:each={deploymentItems} for:item="item">
                                    <div class="deployment-table__row" key={item.key}>
                                        <span>{item.displayName}</span>
                                        <span>{item.apiName}</span>
                                        <span>{item.briefInfo}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </section>
                </template>

                <template if:true={hasImplementationReports}>
                    <section class="implementation-reports" aria-labelledby="implementation-reports-title">
                        <div class="implementation-reports__heading">
                            <lightning-icon icon-name="utility:success" size="small" alternative-text="Implementation reports ready"></lightning-icon>
                            <div>
                                <h2 id="implementation-reports-title">Implementation Reports</h2>
                                <p>Consultant-quality documentation is available for every successful deployment.</p>
                            </div>
                        </div>
                        <div class="implementation-report-list">
                            <template for:each={implementationReportVersions} for:item="report">
                                <article class="implementation-report-row" key={report.key}>
                                    <div class="implementation-report-row__details">
                                        <strong>Implementation Report Ready</strong>
                                        <span>{report.versionLabel}</span>
                                        <span>{report.reportLabel}</span>
                                        <span>{report.generatedLabel}</span>
                                    </div>
                                    <div class="implementation-report-row__actions">
                                        <lightning-button label="Download PDF" icon-name="utility:download" data-version={report.deploymentVersion} data-format="pdf" onclick={handleReportDownload} disabled={isBusy}></lightning-button>
                                        <lightning-button label="Download Word" icon-name="utility:download" data-version={report.deploymentVersion} data-format="docx" onclick={handleReportDownload} disabled={isBusy}></lightning-button>
                                        <lightning-button label="Download Markdown" icon-name="utility:download" data-version={report.deploymentVersion} data-format="markdown" onclick={handleReportDownload} disabled={isBusy}></lightning-button>
                                    </div>
                                </article>
                            </template>
                        </div>
                    </section>
                </template>

                <template if:true={canSelectOrg}>
                    <section class="action-band">
                        <lightning-combobox label="Target Org Selection" options={orgOptions} value={selectedOrgId} onchange={handleValue} data-field="selectedOrgId"></lightning-combobox>
                        <lightning-button variant="brand" label="Select Org" icon-name="utility:check" onclick={handleSelectOrg} disabled={isBusy}></lightning-button>
                    </section>
                </template>

                <lightning-accordion allow-multiple-sections-open active-section-name="details">
                    <lightning-accordion-section name="details" label="Jira Task Details and Requirement Analysis">
                        <dl class="details"><dt>Issue</dt><dd>{job.jiraIssueKey}</dd><dt>Summary</dt><dd>{job.requirement.summary}</dd><dt>Acceptance Criteria</dt><dd>{job.requirement.acceptanceCriteria}</dd><dt>Org Verification</dt><dd>{verifiedAt}</dd></dl>
                    </lightning-accordion-section>
                    <lightning-accordion-section name="plan" label="Implementation Plan for Approval">
                        <div class="human-plan">
                            <h3>What will be delivered</h3>
                            <p class="plan-summary">{planSummary}</p>
                            <h3>Implementation steps</h3>
                            <ol>
                                <template for:each={implementationSteps} for:item="step"><li key={step.key}>{step.text}</li></template>
                            </ol>
                            <h3>Expected outcome</h3>
                            <p>{expectedOutcome}</p>
                            <h3>Business impact</h3>
                            <p>{businessImpact}</p>
                            <h3>How it will be tested</h3>
                            <ul><template for:each={testingItems} for:item="item"><li key={item.key}>{item.text}</li></template></ul>
                            <h3>Risks and assumptions</h3>
                            <ul><template for:each={riskAndAssumptionItems} for:item="item"><li key={item.key}>{item.text}</li></template></ul>
                            <h3>Not included</h3>
                            <ul><template for:each={outOfScopeItems} for:item="item"><li key={item.key}>{item.text}</li></template></ul>
                            <h3>Rollback</h3>
                            <p>{rollbackPlan}</p>
                            <p class="notice">{planNotice}</p>
                        </div>
                    </lightning-accordion-section>
                </lightning-accordion>

                <section class="conversation" aria-labelledby="conversation-title">
                    <h2 id="conversation-title">Manual User Instructions</h2>
                    <p class="conversation-status">Use this area to add a change request or clarification for the current job. This remains available before implementation, after implementation, before deployment, and after deployment.</p>
                    <div class="instruction-band">
                        <lightning-textarea label="Request a change or add an instruction" value={instruction} data-field="instruction" onchange={handleValue} disabled={instructionInputDisabled}></lightning-textarea>
                        <div class="instruction-actions">
                            <lightning-button label="Request Changes" icon-name="utility:edit" onclick={handleAddInstruction} disabled={instructionSendDisabled}></lightning-button>
                            <lightning-button variant="brand" label="Send Instruction" icon-name="utility:send" onclick={handleAddInstruction} disabled={instructionSendDisabled}></lightning-button>
                        </div>
                    </div>
                    <template if:false={canAddInstruction}><p class="conversation-note">Change requests are unavailable only when the job has been cancelled.</p></template>
                </section>

                <div class="actions">
                    <template if:true={canReviewPlan}>
                        <lightning-button variant="brand" label="Approve Implementation" icon-name="utility:check" onclick={handleApproveImplementation} disabled={isBusy}></lightning-button>
                        <lightning-button label="Request Changes" icon-name="utility:edit" onclick={handleAddInstruction} disabled={instructionSendDisabled}></lightning-button>
                        <lightning-button variant="destructive-text" label="Reject" icon-name="utility:close" onclick={handleRejectPlan} disabled={isBusy}></lightning-button>
                    </template>
                    <template if:true={canImplement}><lightning-button variant="brand" label="Implement Locally" icon-name="utility:code_playground" onclick={handleImplement} disabled={isBusy}></lightning-button></template>
                    <template if:true={canValidate}><lightning-button label="Validate" icon-name="utility:test" onclick={handleValidate} disabled={isBusy}></lightning-button></template>
                    <template if:true={canApproveDeployment}>
                        <lightning-button variant="brand" label={approvalActionLabel} icon-name="utility:approval" onclick={handleApproveDeployment} disabled={isBusy}></lightning-button>
                        <lightning-button label={rejectionActionLabel} icon-name="utility:close" onclick={handleRejectDeployment} disabled={isBusy}></lightning-button>
                    </template>
                    <template if:true={hasDeploymentApproval}><lightning-button variant="destructive" label={executionActionLabel} icon-name="utility:upload" onclick={handleDeploy} disabled={isBusy}></lightning-button></template>
                    <template if:true={canRefreshAnalysis}><lightning-button label="Refresh Analysis" icon-name="utility:refresh" onclick={handleRefreshAnalysis} disabled={isBusy}></lightning-button></template>
                    <template if:true={canCancel}><lightning-button label="Cancel" icon-name="utility:ban" onclick={handleCancel} disabled={isBusy}></lightning-button></template>
                </div>
            </template>
        </div>
    </section>
</template>
