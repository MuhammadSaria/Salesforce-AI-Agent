<template>
    <lightning-card title="Salesforce In-Org AI Agent" icon-name="utility:einstein">
        <template if:true={isBusy}><lightning-spinner alternative-text="Working" size="small"></lightning-spinner></template>
        <div class="console">
            <template if:true={errorMessage}><div class="error" role="alert">{errorMessage}</div></template>

            <section class="toolbar" aria-label="Assigned Jira tasks">
                <lightning-combobox label="Assigned Jira Tasks" options={jobOptions} value={selectedJobId} onchange={handleJobSelection}></lightning-combobox>
                <lightning-input label="Jira Issue Key" value={jiraIssueKey} data-field="jiraIssueKey" onchange={handleValue}></lightning-input>
                <lightning-textarea label="Manual User Instruction" value={prompt} data-field="prompt" onchange={handleValue}></lightning-textarea>
                <lightning-button variant="brand" label="Create Job" icon-name="utility:add" onclick={handleCreate} disabled={createDisabled}></lightning-button>
            </section>

            <template if:true={hasJob}>
                <div class="identity-bar">
                    <div><span class="label">Status</span><lightning-badge label={status}></lightning-badge></div>
                    <div><span class="label">Customer</span><strong>{orgContext.customerName}</strong></div>
                    <div><span class="label">Target Org</span><strong>{orgContext.displayName}</strong></div>
                    <div><span class="label">Environment</span><strong>{orgContext.environment}</strong></div>
                    <div><span class="label">Organization ID</span><code>{orgContext.expectedOrgId}</code></div>
                </div>
                <template if:true={isProduction}><div class="production-warning" role="alert">You are reviewing work for a Production Salesforce org. Deployment requires production-specific approval.</div></template>

                <template if:true={canSelectOrg}>
                    <section class="action-band">
                        <lightning-combobox label="Target Org Selection" options={orgOptions} value={selectedOrgId} onchange={handleValue} data-field="selectedOrgId"></lightning-combobox>
                        <lightning-button variant="brand" label="Select Org" icon-name="utility:check" onclick={handleSelectOrg}></lightning-button>
                    </section>
                </template>

                <lightning-accordion allow-multiple-sections-open active-section-name="details">
                    <lightning-accordion-section name="details" label="Jira Task Details and Requirement Analysis">
                        <dl class="details"><dt>Issue</dt><dd>{job.jiraIssueKey}</dd><dt>Summary</dt><dd>{job.requirement.summary}</dd><dt>Acceptance Criteria</dt><dd>{job.requirement.acceptanceCriteria}</dd><dt>Org Verification</dt><dd>{orgContext.verified.verifiedAt}</dd></dl>
                    </lightning-accordion-section>
                    <lightning-accordion-section name="metadata" label="Current Salesforce State and Relevant Metadata"><pre>{metadataText}</pre></lightning-accordion-section>
                    <lightning-accordion-section name="dependencies" label="Retrieved Metadata, Dependencies, and Exclusions"><pre>{dependencyText}</pre></lightning-accordion-section>
                    <lightning-accordion-section name="plan" label="Proposed Implementation, Risks, Assumptions, Tests, and Rollback"><pre>{planText}</pre></lightning-accordion-section>
                    <lightning-accordion-section name="validation" label="Validation Results"><pre>{validationText}</pre></lightning-accordion-section>
                    <lightning-accordion-section name="diff" label="Git Diff"><pre class="diff">{diffText}</pre></lightning-accordion-section>
                    <lightning-accordion-section name="logs" label="Execution Logs and Audit"><pre>{logsText}</pre></lightning-accordion-section>
                </lightning-accordion>

                <section class="instruction-band">
                    <lightning-textarea label="Add Instruction" value={instruction} data-field="instruction" onchange={handleValue}></lightning-textarea>
                    <lightning-button label="Add Instruction" icon-name="utility:add" onclick={handleAddInstruction}></lightning-button>
                </section>

                <div class="actions">
                    <template if:true={canReviewPlan}>
                        <lightning-button variant="brand" label="Approve Implementation" icon-name="utility:check" onclick={handleApproveImplementation}></lightning-button>
                        <lightning-button label="Request Changes" icon-name="utility:edit" onclick={handleAddInstruction}></lightning-button>
                        <lightning-button variant="destructive-text" label="Reject" icon-name="utility:close" onclick={handleRejectPlan}></lightning-button>
                    </template>
                    <template if:true={canImplement}><lightning-button variant="brand" label="Implement Locally" icon-name="utility:code_playground" onclick={handleImplement}></lightning-button></template>
                    <template if:true={canValidate}><lightning-button label="Validate" icon-name="utility:test" onclick={handleValidate}></lightning-button></template>
                    <template if:true={canApproveDeployment}>
                        <lightning-button variant="brand" label="Approve Deployment" icon-name="utility:approval" onclick={handleApproveDeployment}></lightning-button>
                        <lightning-button label="Reject Deployment" icon-name="utility:close" onclick={handleRejectDeployment}></lightning-button>
                    </template>
                    <template if:true={hasDeploymentApproval}><lightning-button variant="destructive" label="Deploy Approved Package" icon-name="utility:upload" onclick={handleDeploy}></lightning-button></template>
                    <template if:true={canRefreshAnalysis}><lightning-button label="Refresh Analysis" icon-name="utility:refresh" onclick={handleRefreshAnalysis}></lightning-button></template>
                    <template if:true={canCancel}><lightning-button label="Cancel" icon-name="utility:ban" onclick={handleCancel}></lightning-button></template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
